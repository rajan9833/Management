# =============================================
#  Employee Management System - Configuration
# =============================================
# Local: defaults below work with MySQL on localhost.
# Render: set environment variables in the Render dashboard (see comments).

# Server — Render injects PORT. Context-path is "/" so https://YOUR-APP.onrender.com/ works;
# APIs are at https://YOUR-APP.onrender.com/auth/login, etc. Render health check: GET /auth/ping
server.port=${PORT:8084}
server.servlet.context-path=/

# ── Database ──────────────────────────────
# Render / cloud: set SPRING_DATASOURCE_URL (full JDBC URL), USERNAME, PASSWORD
# Example (external MySQL): jdbc:mysql://HOST:3306/DB_NAME?useSSL=true&serverTimezone=UTC
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────
# Production: set SPRING_JPA_HIBERNATE_DDL_AUTO=validate (or none) after schema is stable
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
# Dialect: omitted — Hibernate 6 auto-detects MySQL (avoids HHH90000025 warning)
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# ── JWT ───────────────────────────────────
# Render: set JWT_SECRET to a long random secret (hex or base64); do not use the default in production
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ── File Upload ───────────────────────────
# Ephemeral disk on Render unless you attach a persistent disk; photos reset on redeploy unless you use S3 etc.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads/photos}

# ── Logging ───────────────────────────────
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.community.employeemanagement=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
