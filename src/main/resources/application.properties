# =============================================
#  Employee Management System - Configuration
# =============================================
# Local: defaults below work with PostgreSQL on localhost.
# Render: set environment variables in the Render dashboard (see comments).

# Server — Render injects PORT. Context-path is "/" so https://YOUR-APP.onrender.com/ works;
# APIs are at https://YOUR-APP.onrender.com/auth/login, etc. Render health check: GET /auth/ping
server.port=${PORT:8080}
server.servlet.context-path=/

# ── Database ──────────────────────────────
# Cloud: set SPRING_DATASOURCE_URL (full JDBC URL), USERNAME, PASSWORD
# Neon example: jdbc:postgresql://<host>/<db>?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/employee_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────
# Production: set SPRING_JPA_HIBERNATE_DDL_AUTO=validate (or none) after schema is stable
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
# Dialect: omitted — Hibernate 6 auto-detects PostgreSQL (avoids HHH90000025 warning)
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────
# Render: set JWT_SECRET to a long random secret (hex or base64); do not use the default in production
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ── File Upload ───────────────────────────
# Ephemeral disk on Render unless you attach a persistent disk; photos reset on redeploy unless you use S3 etc.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads/photos}

# ── Logging ───────────────────────────────
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.community.employeemanagement=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
