<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employees — EMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app-shell"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
            <h2 style="font-size:1.1rem;font-weight:700;margin:0;">Edit Employee</h2>
            <button onclick="closeEditModal()" style="background:none;border:none;cursor:pointer;color:#64748B;font-size:1.25rem;">✕</button>
        </div>
        <form id="editForm">
            <input type="hidden" id="editId" />
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="editName" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" id="editPhone" class="form-input" pattern="[0-9]{10}" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Age</label>
                    <input type="number" id="editAge" class="form-input" min="18" max="100" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Monthly Salary (₹)</label>
                    <input type="number" id="editSalary" class="form-input" min="1" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Department</label>
                    <select id="editDepartment" class="form-input">
                        <option value="">Select department</option>
                        <option>Engineering</option><option>HR</option>
                        <option>Finance</option><option>Management</option><option>Marketing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Designation</label>
                    <input type="text" id="editDesignation" class="form-input" />
                </div>
            </div>
            <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:0.5rem;">
                <button type="button" onclick="closeEditModal()" class="btn btn-outline">Cancel</button>
                <button type="submit" id="editSubmitBtn" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<div class="main-content">

    <header class="topbar">
        <div style="display:flex;align-items:center;gap:1rem;">
            <button onclick="openSidebar()" style="display:none;" id="menuBtn" class="btn btn-outline btn-sm">
                <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div>
                <h1 style="font-size:1.1rem;font-weight:700;margin:0;">Employees</h1>
                <p style="font-size:0.75rem;color:#64748B;margin:0;" id="count-label">Loading...</p>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem;">
            <div class="search-bar">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" class="form-input" placeholder="Search by name or ID…"
                       oninput="handleSearch(this.value)" />
            </div>
            <a href="add-employee.html" class="btn btn-primary btn-sm">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Employee
            </a>
        </div>
    </header>

    <main class="page-content">
        <div class="card" style="padding:0;overflow:hidden;">
            <div style="overflow-x:auto;">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Aadhaar</th>
                        <th>Phone</th>
                        <th>Age</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="emp-tbody">
                    <tr><td colspan="7" style="text-align:center;padding:2rem;color:#64748B;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="api.js"></script>
<script src="sidebar.js"></script>
<script>
    Auth.requireAuth();
    renderShell('employees');

    let allEmployees = [];

    async function loadEmployees() {
        try {
            const res = await API.getEmployees();
            if (res?.success) {
                allEmployees = res.data;
                renderTable(allEmployees);
                document.getElementById('count-label').textContent =
                    `${allEmployees.length} employee${allEmployees.length !== 1 ? 's' : ''} total`;
            }
        } catch (err) {
            document.getElementById('emp-tbody').innerHTML =
                `<tr><td colspan="7" style="text-align:center;color:#EF4444;padding:2rem;">Failed to load employees</td></tr>`;
        }
    }

    function renderTable(employees) {
        const tbody = document.getElementById('emp-tbody');
        if (employees.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                </svg>
                <p>No employees found</p>
                <a href="add-employee.html" class="btn btn-primary btn-sm">Add First Employee</a>
            </div>
        </td></tr>`;
            return;
        }

        tbody.innerHTML = employees.map(e => `
        <tr>
            <td>
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    ${e.photoPath
            ? `<div class="avatar"><img src="${e.photoPath}" alt="${e.name}" /></div>`
            : `<div class="avatar">${UI.initials(e.name)}</div>`}
                    <div>
                        <div style="font-weight:600;font-size:0.875rem;">${e.name}</div>
                        <div style="font-size:0.72rem;color:#64748B;">${e.designation || 'Employee'} · ID #${e.id}</div>
                    </div>
                </div>
            </td>
            <td style="font-family:'Space Mono',monospace;font-size:0.8rem;color:#64748B;letter-spacing:0.03em;">
                ${e.aadhaar.replace(/(\d{4})(\d{4})(\d{4})/, '$1 $2 $3')}
            </td>
            <td style="font-size:0.875rem;">${e.phone}</td>
            <td style="font-size:0.875rem;text-align:center;">${e.age}</td>
            <td>
                <span class="badge ${UI.deptColor(e.department)}">${e.department || '—'}</span>
            </td>
            <td style="font-weight:700;color:#059669;">${UI.currency(e.salary)}</td>
            <td>
                <div style="display:flex;gap:0.4rem;">
                    <button onclick='openEditModal(${JSON.stringify(e).replace(/'/g, "&#39;")})' class="btn btn-outline btn-sm">
                        <svg style="width:13px;height:13px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        Edit
                    </button>
                    <button onclick="deleteEmployee(${e.id}, '${e.name}')" class="btn btn-danger btn-sm">
                        <svg style="width:13px;height:13px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/>
                            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
                        </svg>
                        Delete
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
    }

    let searchTimer;
    function handleSearch(value) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(async () => {
            if (!value.trim()) {
                renderTable(allEmployees);
                return;
            }
            try {
                const res = await API.searchEmployees(value.trim());
                if (res?.success) renderTable(res.data);
            } catch (e) {
                renderTable(allEmployees.filter(emp =>
                    emp.name.toLowerCase().includes(value.toLowerCase()) ||
                    String(emp.id).includes(value)
                ));
            }
        }, 300);
    }

    function openEditModal(emp) {
        document.getElementById('editId').value         = emp.id;
        document.getElementById('editName').value       = emp.name;
        document.getElementById('editPhone').value      = emp.phone;
        document.getElementById('editAge').value        = emp.age;
        document.getElementById('editSalary').value     = emp.salary;
        document.getElementById('editDepartment').value = emp.department || '';
        document.getElementById('editDesignation').value= emp.designation || '';
        document.getElementById('editModal').classList.add('open');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('open');
    }

    document.getElementById('editForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('editSubmitBtn');
        UI.setLoading(btn, true);

        const id = document.getElementById('editId').value;
        const fd = new FormData();
        fd.append('name',        document.getElementById('editName').value);
        fd.append('phone',       document.getElementById('editPhone').value);
        fd.append('age',         document.getElementById('editAge').value);
        fd.append('salary',      document.getElementById('editSalary').value);
        fd.append('department',  document.getElementById('editDepartment').value);
        fd.append('designation', document.getElementById('editDesignation').value);

        try {
            const res = await API.updateEmployee(id, fd);
            if (res?.success) {
                UI.toast('Employee updated successfully!', 'success');
                closeEditModal();
                loadEmployees();
            } else {
                UI.toast(res?.message || 'Update failed', 'error');
            }
        } catch (err) {
            UI.toast('Failed to update employee', 'error');
        } finally {
            UI.setLoading(btn, false);
        }
    };

    async function deleteEmployee(id, name) {
        if (!confirm(`Delete employee "${name}"?\nThis will also delete their attendance records.`)) return;
        try {
            const res = await API.deleteEmployee(id);
            if (res?.success) {
                UI.toast(`${name} deleted successfully`, 'success');
                loadEmployees();
            } else {
                UI.toast(res?.message || 'Delete failed', 'error');
            }
        } catch (err) {
            UI.toast('Failed to delete employee', 'error');
        }
    }

    // Close modal on overlay click
    document.getElementById('editModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('editModal')) closeEditModal();
    });

    loadEmployees();
    registerAuthReload(loadEmployees);
</script>
</body>
</html>
